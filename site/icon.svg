<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Pinterest red rounded square background -->
  <rect width="128" height="128" rx="28" ry="28" fill="#E60023"/>
  <!-- Two overlapping rounded rectangles forming a copy glyph in white.
       The front rectangle is filled with the brand red so it visually cuts
       into the back one (canonical Lucide / Heroicons copy mark). -->
  <rect x="30" y="46" width="58" height="64" rx="10" ry="10"
        fill="none" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
  <rect x="40" y="18" width="58" height="64" rx="10" ry="10"
        fill="#E60023" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
</svg>
